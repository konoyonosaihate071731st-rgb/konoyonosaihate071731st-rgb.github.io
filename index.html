<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星の駅</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Yu Gothic","Meiryo",sans-serif;
    color:white;
    text-align:center;
    overflow-x:hidden;
    min-height:100vh;

    background:
    radial-gradient(circle at top,#63d8ff 0%,#0a2d78 35%,#02030d 100%);
}

/* 星空 */

.stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{

0%,100%{

opacity:.2;
transform:scale(1);

}

50%{

opacity:1;
transform:scale(2);

}

}

/* ヘッダー */

header{

padding:80px 20px 50px;

}

h1{

font-size:62px;
letter-spacing:10px;

text-shadow:
0 0 8px #9ee8ff,
0 0 18px #6fdcff,
0 0 35px #3fbfff;

}

.subtitle{

margin-top:18px;

font-size:22px;

opacity:.95;

}

.english{

margin-top:10px;

font-size:14px;

letter-spacing:4px;

color:#bfefff;

}

/* ギャラリー */

.gallery{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:35px;

padding:50px 25px;

}

/* カード */

.card{

width:320px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.25);

border-radius:22px;

padding:18px;

backdrop-filter:blur(12px);

box-shadow:0 0 30px rgba(0,180,255,.25);

transition:.35s;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 45px rgba(120,220,255,.55);

}

.card h2{

margin-bottom:15px;

}

.card img{

width:100%;

border-radius:14px;

cursor:pointer;

transition:.35s;

}

.card img:hover{

transform:scale(1.03);

}

.card p{

margin-top:15px;

line-height:1.7;

opacity:.9;

}

/* フッター */

footer{

margin:70px 0 40px;

opacity:.8;

color:#d9f5ff;

}

/* 拡大表示 */

.lightbox{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.93);

z-index:999;

}

.lightbox img{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

max-width:92%;

max-height:90%;

border-radius:15px;

box-shadow:0 0 40px #8fe7ff;

}

.close{

position:absolute;

right:30px;

top:15px;

font-size:55px;

cursor:pointer;

}

/* スマホ */

@media(max-width:700px){

h1{

font-size:42px;

letter-spacing:5px;

}

.subtitle{

font-size:16px;

}

.card{

width:92%;

}

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header>

<h1>🌌 星 の 駅 🌌</h1>

<p class="subtitle">
銀河鉄道が運ぶ、幻想の世界へようこそ。
</p>

<p class="english">
A Fantasy Gallery of the Galaxy Railway
</p>

</header>

<section class="gallery">

<div class="card">

<h2>作品01</h2>

<img src="caf1c607-0499-4eaa-bf51-27605f56094d.png"
onclick="openImg(this.src)">

<p>
幻想的な青の世界。
</p>

</div>

<div class="card">

<h2>作品02</h2>

<img src="db8bb38b-e8b5-4e10-88ce-7a8e6a47ec6f.png"
onclick="openImg(this.src)">

<p>
星の駅に降り立つプリンセス。
</p>

</div>

</section>

<footer>

🌌 星の駅 - Fantasy Gallery -

</footer>

<div id="lightbox" class="lightbox" onclick="closeImg()">

<span class="close">&times;</span>

<img id="lightbox-img">
</div>

<script>

// 星空を生成
const stars = document.getElementById("stars");

for(let i = 0; i < 120; i++){

    const star = document.createElement("div");

    star.className = "star";

    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";

    star.style.animationDelay = Math.random()*3 + "s";

    star.style.animationDuration =
        (2 + Math.random()*4) + "s";

    stars.appendChild(star);

}

// 画像拡大
function openImg(src){

    document.getElementById("lightbox").style.display="block";

    document.getElementById("lightbox-img").src=src;

}

// 閉じる
function closeImg(){

    document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
